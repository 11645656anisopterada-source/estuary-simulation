<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>多摩川・相模川 汽水域シミュレーション</title>

<style>

body{
    margin:0;
    background:#101418;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

.wrapper{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

canvas{
    background:#000;
    border:2px solid white;
}

.info{
    margin-top:8px;
}

.legend{
    margin:10px;
}

.box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:4px;
}

.color{
    width:30px;
    height:16px;
}

button{
    margin:10px;
    padding:10px 20px;
    font-size:16px;
}

</style>
</head>

<body>

<h1>多摩川・相模川 汽水域シミュレーション</h1>

<div class="legend">

<div class="box">
<div class="color" style="background:blue"></div>
<div>淡水域</div>
</div>

<div class="box">
<div class="color" style="background:purple"></div>
<div>汽水域</div>
</div>

<div class="box">
<div class="color" style="background:red"></div>
<div>海水域</div>
</div>

</div>

<button onclick="resetAll()">リセット</button>

<div class="wrapper">

<div>
<h2>多摩川モデル</h2>
<canvas id="tama" width="420" height="700"></canvas>
<div class="info" id="tamaInfo"></div>
</div>

<div>
<h2>相模川モデル</h2>
<canvas id="sagami" width="420" height="700"></canvas>
<div class="info" id="sagamiInfo"></div>
</div>

</div>

<script>

// =======================================
// 基本設定
// =======================================

const CELL = 4;

const W = 100;
const H = 170;

// =======================================
// 川モデル
// =======================================

class RiverModel{

    constructor(canvasId,type){

        this.canvas =
            document.getElementById(canvasId);

        this.ctx =
            this.canvas.getContext("2d");

        this.type = type;

        this.river = [];
        this.depth = [];
        this.salinity = [];

        this.initialize();
    }

    initialize(){

        this.river = [];
        this.depth = [];
        this.salinity = [];

        for(let y=0;y<H;y++){

            this.river[y] = [];
            this.depth[y] = [];
            this.salinity[y] = [];

            for(let x=0;x<W;x++){

                this.river[y][x] = false;
                this.depth[y][x] = 0;
                this.salinity[y][x] = 0;
            }
        }

        this.createRiver();
    }

    // ===================================
    // 写真形状を参考にした川生成
    // ===================================

    createRiver(){

        for(let y=0;y<H;y++){

            let center;
            let width;

            // -------------------------------
            // 多摩川
            // -------------------------------

            if(this.type === "tama"){

                center =
                    48
                    + 10*Math.sin(y/18)
                    + 5*Math.sin(y/7);

                width =
                    11
                    + 3*Math.sin(y/13);

            }

            // -------------------------------
            // 相模川
            // -------------------------------

            else{

                center =
                    50
                    + 3*Math.sin(y/30)
                    + 1.5*Math.sin(y/9);

                width =
                    9
                    + 1*Math.sin(y/15);

            }

            for(let x=0;x<W;x++){

                const dx =
                    Math.abs(x-center);

                if(dx < width){

                    this.river[y][x] = true;

                    // 川底地形
                    // 中央が深い

                    let depthValue =

                        1.0
                        - (dx/width)*0.5

                        + 0.15*Math.sin(y/20);

                    this.depth[y][x] =
                        depthValue;

                    // 初期塩分

                    this.salinity[y][x] = 0;
                }
            }
        }
    }

    // ===================================
    // シミュレーション更新
    // ===================================

    update(){

        let next = [];

        for(let y=0;y<H;y++){

            next[y] = [];

            for(let x=0;x<W;x++){

                next[y][x] =
                    this.salinity[y][x];
            }
        }

        // ---------------------------
        // 上流から淡水
        // ---------------------------

        for(let x=0;x<W;x++){

            if(this.river[0][x]){

                this.salinity[0][x] = 0;
            }
        }

        // ---------------------------
        // 河口から海水
        // ---------------------------

        for(let x=0;x<W;x++){

            if(this.river[H-1][x]){

                this.salinity[H-1][x] = 1;
            }
        }

        // ---------------------------
        // 流体計算
        // ---------------------------

        for(let y=1;y<H-1;y++){

            for(let x=1;x<W-1;x++){

                if(this.river[y][x]){

                    let s =
                        this.salinity[y][x];

                    let up =
                        this.salinity[y-1][x];

                    let down =
                        this.salinity[y+1][x];

                    let left =
                        this.salinity[y][x-1];

                    let right =
                        this.salinity[y][x+1];

                    // 拡散

                    let diffusion =

                        (
                            up
                            + down
                            + left
                            + right
                        ) / 4;

                    // 深い場所ほど混ざりやすい

                    let depthMix =

                        this.depth[y][x]
                        * 0.04;

                    // 真水流れ
                    let freshFlow =
                        up * 0.15;

                    // 海水逆流
                    let seaFlow =
                        down * 0.12;

                    next[y][x] =

                        s*0.60
                        + diffusion*0.20
                        + freshFlow
                        + seaFlow
                        + depthMix;

                    // 制限

                    if(next[y][x] > 1){

                        next[y][x] = 1;
                    }

                    if(next[y][x] < 0){

                        next[y][x] = 0;
                    }
                }
            }
        }

        this.salinity = next;
    }

    // ===================================
    // 描画
    // ===================================

    draw(){

        this.ctx.fillStyle =
            "black";

        this.ctx.fillRect(
            0,
            0,
            this.canvas.width,
            this.canvas.height
        );

        for(let y=0;y<H;y++){

            for(let x=0;x<W;x++){

                if(this.river[y][x]){

                    let s =
                        this.salinity[y][x];

                    let color;

                    // 淡水域

                    if(s <= 0.02){

                        color = "rgb(0,100,255)";
                    }

                    // 海水域

                    else if(s >= 0.98){

                        color = "rgb(255,0,0)";
                    }

                    // 汽水域

                    else{

                        let r =
                            Math.floor(255*s);

                        let b =
                            Math.floor(
                                255*(1-s)
                            );

                        color =
                            `rgb(${r},0,${b})`;
                    }

                    this.ctx.fillStyle =
                        color;

                    this.ctx.fillRect(
                        x*CELL,
                        y*CELL,
                        CELL,
                        CELL
                    );
                }
            }
        }
    }

    // ===================================
    // 汽水域境界検出
    // ===================================

    getBoundary(){

        let top = H;
        let bottom = 0;

        for(let y=0;y<H;y++){

            let mixed = false;

            for(let x=0;x<W;x++){

                if(this.river[y][x]){

                    let s =
                        this.salinity[y][x];

                    if(
                        s > 0.02
                        &&
                        s < 0.98
                    ){

                        mixed = true;
                    }
                }
            }

            if(mixed){

                top =
                    Math.min(top,y);

                bottom =
                    Math.max(bottom,y);
            }
        }

        return {
            top,
            bottom
        };
    }
}

// =======================================
// モデル生成
// =======================================

const tama =
    new RiverModel(
        "tama",
        "tama"
    );

const sagami =
    new RiverModel(
        "sagami",
        "sagami"
    );

// =======================================
// アニメーション
// =======================================

function animate(){

    tama.update();
    sagami.update();

    tama.draw();
    sagami.draw();

    const tb =
        tama.getBoundary();

    const sb =
        sagami.getBoundary();

    document.getElementById(
        "tamaInfo"
    ).innerHTML =

        `汽水域境界: ${tb.top} ～ ${tb.bottom}`;

    document.getElementById(
        "sagamiInfo"
    ).innerHTML =

        `汽水域境界: ${sb.top} ～ ${sb.bottom}`;

    requestAnimationFrame(
        animate
    );
}

function resetAll(){

    tama.initialize();
    sagami.initialize();
}

animate();

</script>

</body>
    </html>
