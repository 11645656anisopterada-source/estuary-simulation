const W = 105;
const H = 180;

class RiverSimulation{

    constructor(canvasId, centerData, widthData){

        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");

        this.centerData = centerData;
        this.widthData = widthData;

        this.river = [];
        this.salinity = [];
        this.depth = [];

        this.initialize();
    }

    initialize(){

        for(let y=0;y<H;y++){

            this.river[y] = [];
            this.salinity[y] = [];
            this.depth[y] = [];

            for(let x=0;x<W;x++){

                this.river[y][x] = false;
                this.salinity[y][x] = 0;
                this.depth[y][x] = 0;
            }
        }

        this.createRiver();
    }

    createRiver(){

        for(let y=0;y<H;y++){

            const center = this.centerData[y];
            const width = this.widthData[y];

            for(let x=0;x<W;x++){

                const dx = Math.abs(x-center);

                if(dx <= width){

                    this.river[y][x] = true;

                    // 中央ほど深い
                    this.depth[y][x] =
                        1.0 - (dx/width)*0.45;
                }
            }
        }
    }

    update(){

        let next = [];

        for(let y=0;y<H;y++){

            next[y] = [];

            for(let x=0;x<W;x++){

                next[y][x] = this.salinity[y][x];
            }
        }

        // 上流 真水
        for(let x=0;x<W;x++){

            if(this.river[0][x]){

                this.salinity[0][x] = 0;
            }
        }

        // 河口 海水
        for(let x=0;x<W;x++){

            if(this.river[H-1][x]){

                this.salinity[H-1][x] = 1;
            }
        }

        for(let y=1;y<H-1;y++){

            for(let x=1;x<W-1;x++){

                if(this.river[y][x]){

                    const s = this.salinity[y][x];

                    const up = this.salinity[y-1][x];
                    const down = this.salinity[y+1][x];
                    const left = this.salinity[y][x-1];
                    const right = this.salinity[y][x+1];

                    const diffusion =
                        (up+down+left+right)/4;

                    const depthMix =
                        this.depth[y][x]*0.045;

                    next[y][x] =
                        s*0.60
                        + diffusion*0.20
                        + up*0.13
                        + down*0.10
                        + depthMix;

                    if(next[y][x] > 1){
                        next[y][x] = 1;
                    }

                    if(next[y][x] < 0){
                        next[y][x] = 0;
                    }
                }
            }
        }

        this.salinity = next;
    }

    draw(){

        this.ctx.fillStyle = "black";

        this.ctx.fillRect(
            0,
            0,
            this.canvas.width,
            this.canvas.height
        );

        for(let y=0;y<H;y++){

            for(let x=0;x<W;x++){

                if(this.river[y][x]){

                    const s = this.salinity[y][x];

                    let color;

                    if(s <= 0.02){

                        color = "rgb(0,120,255)";
                    }

                    else if(s >= 0.98){

                        color = "rgb(255,0,0)";
                    }

                    else{

                        const r = Math.floor(255*s);
                        const b = Math.floor(255*(1-s));

                        color = `rgb(${r},0,${b})`;
                    }

                    this.ctx.fillStyle = color;

                    this.ctx.fillRect(
                        x*CELL,
                        y*CELL,
                        CELL,
                        CELL
                    );
                }
            }
        }
    }

    getBoundary(){

        let top = H;
        let bottom = 0;

        for(let y=0;y<H;y++){

            let mixed = false;

            for(let x=0;x<W;x++){

                if(this.river[y][x]){

                    const s = this.salinity[y][x];

                    if(s > 0.02 && s < 0.98){

                        mixed = true;
                    }
                }
            }

            if(mixed){

                top = Math.min(top,y);
                bottom = Math.max(bottom,y);
            }
        }

        return {top,bottom};
    }
}

const tama = new RiverSimulation(
    "tama",
    tamaCenter,
    tamaWidth
);

const sagami = new RiverSimulation(
    "sagami",
    sagamiCenter,
    sagamiWidth
);

function animate(){

    tama.update();
    sagami.update();

    tama.draw();
    sagami.draw();

    const tb = tama.getBoundary();
    const sb = sagami.getBoundary();

    document.getElementById("tamaInfo").innerHTML =
        `汽水域範囲: ${tb.top} ～ ${tb.bottom}`;

    document.getElementById("sagamiInfo").innerHTML =
        `汽水域範囲: ${sb.top} ～ ${sb.bottom}`;

    requestAnimationFrame(animate);
}

function resetAll(){

    tama.initialize();
    sagami.initialize();
}

animate();
